<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140">
  <!-- ===== Colors =====
       Orange: #F15A24
       Dark:   #111827
       Gray:   #6B7280
       Red:    #E11D48
  -->

  <!-- Mark (target) -->
  <g transform="translate(12,34)">
    <!-- outer ring -->
    <circle cx="26" cy="26" r="22" fill="none" stroke="#111827" stroke-width="6"></circle>
    <!-- inner ring subtle -->
    <circle cx="26" cy="26" r="12" fill="none" stroke="#111827" stroke-width="3" opacity="0.35"></circle>
    <!-- red dot -->
    <circle cx="26" cy="26" r="5.2" fill="#E11D48"></circle>
    <!-- small satellite dot (top-right) -->
    <circle cx="46.5" cy="6.5" r="3.8" fill="#111827"></circle>
  </g>

  <!-- Wordmark: MC (orange) + NEX (dark) -->
  <g transform="translate(78,32)">
    <!-- A slight italic feel -->
    <g transform="skewX(-10)">
      <text x="0" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#F15A24" letter-spacing="1.5">MC</text>

      <text x="92" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#111827" letter-spacing="1.5">NEX</text>
    </g>

    <!-- Tagline -->
    <text x="2" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-style="italic" fill="#6B7280" letter-spacing="0.3">Multimedia Core of the Next...</text>
  </g>
</svg>
